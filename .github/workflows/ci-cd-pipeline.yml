# Optimize for faster execution and better caching
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_ENV: ci

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
      fail-fast: true
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
      
      - name: Run tests
        run: npm test -- --coverage
      
      - name: Upload coverage reports
        if: matrix.node-version == '20.x'
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
      
      - name: Build application
        run: npm run build || echo "No build script defined"
      
      - name: Deploy to production
        run: |
          echo "Deploying application to production..."
          # Add your deployment commands here
          # Examples:
          # - Deploy to Heroku: npx heroku deploy
          # - Deploy to AWS: aws s3 sync dist/ s3://bucket-name
          # - Deploy to Azure: az webapp up --name MyWebApp
          # - Deploy to Vercel: npx vercel --prod
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      
      - name: Notify deployment
        if: success()
        run: echo "Deployment completed successfully!"
      
      - name: Notify deployment failure
        if: failure()
        run: echo "Deployment failed!"
        continue-on-error: true
